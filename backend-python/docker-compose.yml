version: '3.8'

# ============================================================
# STAP — Docker Compose
#
# OPTION A (default): Use Proxmox LXC container for PostgreSQL
#   → Set DATABASE_URL in .env to point to your Proxmox container
#   → Only start the 'api' service: docker-compose up api
#
# OPTION B: Use local Docker PostgreSQL (dev / fallback)
#   → Uncomment the 'db' service below
#   → docker-compose up  (starts both db + api)
# ============================================================

services:

  # ── OPTION B: Local PostgreSQL (uncomment if not using Proxmox) ──
  # db:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_USER: stap_user
  #     POSTGRES_PASSWORD: Stap@2026!Secure
  #     POSTGRES_DB: stap_db
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U stap_user -d stap_db"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Proxmox PostgreSQL — update IP in .env
      - DATABASE_URL=${DATABASE_URL}
      - ENV=development
      - APP_PORT=8000
    # Uncomment if using local Docker DB:
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped

# volumes:
#   postgres_data:
